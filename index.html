
<!DOCTYPE html>
<html lang="it" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dream3D - Diamo forma alle tue idee</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#FF4D26',
                        'background-dark': '#0A0A0B',
                        'card-dark': '#161618',
                    },
                    fontFamily: {
                        display: ['Outfit', 'sans-serif'],
                        sans: ['Inter', 'sans-serif'],
                    },
                    animation: {
                        'fade-in-up': 'fadeInUp 0.8s ease-out forwards',
                        'pulse-glow': 'pulseGlow 4s ease-in-out infinite',
                        'shimmer-fast': 'shimmer 2.5s linear infinite',
                        'float': 'float 6s ease-in-out infinite',
                    },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        pulseGlow: {
                            '0%, 100%': { filter: 'drop-shadow(0 0 10px rgba(255, 77, 38, 0.3))' },
                            '50%': { filter: 'drop-shadow(0 0 25px rgba(255, 77, 38, 0.6))' },
                        },
                        shimmer: {
                            '0%': { backgroundPosition: '-200% center' },
                            '100%': { backgroundPosition: '200% center' },
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            @apply transition-colors duration-300;
            background-color: #F8FAFC;
            color: #0F172A;
        }
        .dark body {
            background-color: #0A0A0B;
            color: #F8FAFC;
        }
        .hero-gradient {
            background: radial-gradient(circle at 50% 50%, rgba(255, 77, 38, 0.05) 0%, transparent 60%);
        }
        .dark .hero-gradient {
            background: radial-gradient(circle at 50% 50%, rgba(255, 77, 38, 0.08) 0%, transparent 60%);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }
        .dark .glass-card {
            background: rgba(22, 22, 24, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .text-shimmer-effect {
            position: relative;
            background: linear-gradient(
                120deg, 
                #FF4D26 25%, 
                #FF8E26 40%, 
                #ffffff 50%, 
                #FF8E26 60%, 
                #FF4D26 75%
            );
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 3s infinite linear;
            display: inline-block;
        }

        .dark .text-shimmer-effect {
            background: linear-gradient(
                120deg, 
                #FF4D26 25%, 
                #FF8E26 40%, 
                #ffffff 50%, 
                #FF8E26 60%, 
                #FF4D26 75%
            );
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        @keyframes shimmer {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        .glow-overlay {
            position: relative;
        }
        .glow-overlay::after {
            content: attr(data-text);
            position: absolute;
            left: 0;
            top: 0;
            z-index: -1;
            background: inherit;
            filter: blur(15px);
            opacity: 0.3;
            -webkit-background-clip: text;
            animation: pulseGlow 4s ease-in-out infinite;
        }
        .dark .glow-overlay::after {
            opacity: 0.5;
        }

        .reveal-delay-1 { animation-delay: 0.1s; }
        .reveal-delay-2 { animation-delay: 0.2s; }
        .reveal-delay-3 { animation-delay: 0.3s; }

        /* Estili per il viewer 3D */
        model-viewer {
            width: 100%;
            height: 100%;
            background-color: transparent;
            --poster-color: transparent;
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react/": "https://esm.sh/react@^19.2.4/",
    "@google/genai": "https://esm.sh/@google/genai@^1.41.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.564.0"
  }
}
</script>
</head>
<body>
    <div id="root"></div>
</body>
</html>
